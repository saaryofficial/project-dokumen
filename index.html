<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PT. Catur Guna Mandiri | Sistem Outsourcing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="login-view" id="loginView">
        <div class="login-card">
          <div class="brand-block">
            <img src="images/logo-cgm-login.png" alt="Logo PT. Catur Guna Mandiri" class="brand-logo" />
            <div>
              <p class="eyebrow">Enterprise Workforce Platform</p>
              <h1>Sistem Manajemen Outsourcing</h1>
              <p class="subtitle">Kelola client, tenaga kerja, payroll otomatis, dan user management dalam satu platform.</p>
            </div>
          </div>
          <form id="loginForm" class="login-form">
            <label>Email Perusahaan<input type="email" value="admin@caturgunamandiri.co.id" required /></label>
            <label>Kata Sandi<input type="password" value="password123" required /></label>
            <button type="submit">Masuk ke Sistem</button>
          </form>
        </div>
      </section>

      <section class="dashboard-view hidden" id="dashboardView">
        <aside class="sidebar">
          <div class="sidebar-brand">
            <img src="images/logo-cgm.png" alt="Logo CGM" />
            <div><strong>PT. Catur Guna Mandiri</strong><span>Outsourcing Services</span></div>
          </div>
          <nav id="sidebarMenu"></nav>
          <button id="logoutBtn" class="logout-btn">Keluar</button>
        </aside>

        <div class="content-area">
          <header class="topbar">
            <div><h2 id="pageTitle">Dashboard Operasional</h2><p id="pageSubtitle">Sistem manajemen outsourcing terpadu.</p></div>
            <div class="profile-pill">Admin CGM</div>
          </header>
          <section id="contentHost" class="menu-content active"></section>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
